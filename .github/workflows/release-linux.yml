# Tagged-release Linux build matrix.
#
# Trigger: push of a v* tag. Produces both AppImage (single-file
# fallback) and Flatpak (.flatpak bundle, primary channel) artifacts
# and attaches them to the GitHub Release for the tag.
#
# The Flathub submission is manual and lives outside this workflow —
# see packaging/flatpak/FLATHUB.md.

name: release-linux

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-appimage:
    name: AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install system dependencies
        run: |
          # ubuntu-22.04 has no glslc package; pull it from the LunarG
          # Vulkan SDK apt repo (shaderc ships /usr/bin/glslc).
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://packages.lunarg.com/lunarg-signing-key-pub.asc \
              | sudo tee /etc/apt/keyrings/lunarg.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/lunarg.asc] https://packages.lunarg.com/vulkan jammy main" \
              | sudo tee /etc/apt/sources.list.d/lunarg-vulkan-jammy.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential ninja-build pkg-config python3-pip \
              shaderc libvulkan-dev libglfw3-dev \
              libraw-dev liblensfun-dev libsqlite3-dev libjpeg-dev \
              libtiff-dev libpng-dev desktop-file-utils \
              shared-mime-info appstream \
              zsync file
          glslc --version
          # ubuntu-22.04's apt meson is 0.61; the project requires >=1.3.
          # pip is the cleanest way to pin a recent meson on the runner.
          python3 -m pip install --upgrade 'meson>=1.3.0'

      - name: derive version + epoch from tag
        id: meta
        run: |
          tag=${GITHUB_REF#refs/tags/}
          version=${tag#v}
          epoch=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%ct "$tag")
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "epoch=$epoch" >>"$GITHUB_OUTPUT"

      - name: fetch linuxdeploy
        run: |
          mkdir -p tools
          curl -fSL -o tools/linuxdeploy \
              https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x tools/linuxdeploy
          # AppImage tools fail under containers without FUSE; extract and
          # invoke the embedded squashfs directly via --appimage-extract.
          (cd tools && ./linuxdeploy --appimage-extract >/dev/null)
          echo "$PWD/tools/squashfs-root/usr/bin" >>"$GITHUB_PATH"

      - name: meson setup + compile (prefix=/usr)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.epoch }}
        run: |
          meson setup build \
              --buildtype=release \
              --prefix=/usr \
              -Db_lto=true \
              -Dstrip=true
          meson compile -C build

      - name: build AppImage
        env:
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.epoch }}
          VERSION: ${{ steps.meta.outputs.version }}
          LINUXDEPLOY: linuxdeploy
        run: |
          packaging/appimage/build-appimage.sh

      - name: list artifacts
        run: |
          ls -lh aperture-*.AppImage aperture-*.AppImage.zsync || true
          file aperture-*.AppImage || true

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aperture-*.AppImage
            aperture-*.AppImage.zsync
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}

  linux-flatpak:
    name: Flatpak bundle (x86_64)
    runs-on: ubuntu-22.04
    # flatpak/flatpak-github-actions runs flatpak-builder inside the
    # freedesktop SDK container so the runner only needs Docker.
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: derive version + epoch from tag
        id: meta
        run: |
          # flatpak-builder action runs in a container as a different uid;
          # mark the workspace safe so git doesn't reject it (CVE-2022-24765).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          tag=${GITHUB_REF#refs/tags/}
          version=${tag#v}
          epoch=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%ct "$tag")
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "epoch=$epoch" >>"$GITHUB_OUTPUT"

      - name: pin aperture source + epoch to this tag
        run: |
          tag=${{ steps.meta.outputs.tag }}
          epoch=${{ steps.meta.outputs.epoch }}
          # rewrite the aperture module source from main → this tag and
          # SOURCE_DATE_EPOCH from 0 → the tag commit time so AppStream
          # <release date> matches the tag (mirrors the AppImage path).
          # yq would be cleaner; sed keeps the workflow dependency-free.
          sed -i "s|branch: main|tag: ${tag}|" \
              packaging/flatpak/io.github.octalium.aperture.yml
          sed -i "s|SOURCE_DATE_EPOCH: '0'|SOURCE_DATE_EPOCH: '${epoch}'|" \
              packaging/flatpak/io.github.octalium.aperture.yml

      - name: build flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/io.github.octalium.aperture.yml
          bundle: aperture-${{ steps.meta.outputs.version }}-x86_64.flatpak
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aperture-*.flatpak
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
