# Tagged-release Linux build matrix.
#
# Trigger: push of a v* tag. Produces a Flatpak (.flatpak bundle)
# artifact and attaches it to the GitHub Release for the tag.
#
# The Flathub submission is manual and lives outside this workflow —
# see packaging/flatpak/FLATHUB.md.

name: release-linux

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-flatpak:
    name: Flatpak bundle (x86_64)
    runs-on: ubuntu-22.04
    # flatpak/flatpak-github-actions runs flatpak-builder inside the
    # freedesktop SDK container so the runner only needs Docker.
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: derive version + epoch from tag
        id: meta
        run: |
          # flatpak-builder action runs in a container as a different uid;
          # mark the workspace safe so git doesn't reject it (CVE-2022-24765).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          tag=${GITHUB_REF#refs/tags/}
          version=${tag#v}
          epoch=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%ct "$tag")
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "epoch=$epoch" >>"$GITHUB_OUTPUT"

      - name: pin aperture source + epoch to this tag
        run: |
          tag=${{ steps.meta.outputs.tag }}
          epoch=${{ steps.meta.outputs.epoch }}
          # rewrite the aperture module's source from type:git+branch:main
          # to type:archive against the tarball URL, with sha256 computed
          # from the tarball itself. tarballs avoid the credential-prompt
          # failure mode flatpak-builder hit on git+tag fetches inside
          # the container (see #484). also rewrite SOURCE_DATE_EPOCH
          # from 0 → the tag commit time so AppStream <release date>
          # matches the tag.
          tarball_url="https://github.com/octalium/aperture/archive/refs/tags/${tag}.tar.gz"
          tarball_sha=$(curl -fsSL "$tarball_url" | sha256sum | cut -d' ' -f1)
          export tag tarball_url tarball_sha
          python3 - <<'PY'
          import os
          p = "packaging/flatpak/io.github.octalium.aperture.yml"
          tag = os.environ["tag"]
          tarball_url = os.environ["tarball_url"]
          tarball_sha = os.environ["tarball_sha"]
          old = (
              "      - type: git\n"
              "        url: https://github.com/octalium/aperture.git\n"
              "        # branch/tag/commit is rewritten by the release workflow before\n"
              "        # flatpak-builder runs. Default keeps manual local builds usable\n"
              "        # off main.\n"
              "        branch: main"
          )
          new = (
              f"      - type: archive\n"
              f"        url: {tarball_url}\n"
              f"        sha256: {tarball_sha}\n"
              f"        dest-filename: aperture-{tag}.tar.gz\n"
              f"        strip-components: 1"
          )
          src = open(p).read()
          assert old in src, "manifest aperture-source block didn't match expected shape; aborting rewrite"
          open(p, "w").write(src.replace(old, new))
          PY
          sed -i "s|SOURCE_DATE_EPOCH: '0'|SOURCE_DATE_EPOCH: '${epoch}'|" \
              packaging/flatpak/io.github.octalium.aperture.yml

      - name: build flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/io.github.octalium.aperture.yml
          bundle: aperture-${{ steps.meta.outputs.version }}-x86_64.flatpak
          # key on manifest hash so the cache survives across releases
          # until the manifest itself changes (the previous github.sha
          # key cold-started the cache on every tag push).
          cache-key: flatpak-builder-${{ hashFiles('packaging/flatpak/*.yml') }}
          upload-artifact: false

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aperture-*.flatpak
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
