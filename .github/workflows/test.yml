# Runs the meson test suite on every PR open/synchronize and every push
# to dev. Phase 2 of the test infrastructure rollout (umbrella #442).
#
# Branch protection on `dev` requiring this check is an operator step
# applied via GitHub Settings → Branches once this workflow has landed.

name: tests

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  test:
    name: meson test (ubuntu-22.04)
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install system dependencies
        run: |
          # ubuntu-22.04 has no glslc package; pull it from the LunarG
          # Vulkan SDK apt repo (shaderc ships /usr/bin/glslc). Mirrors
          # the install block in release-linux.yml.
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://packages.lunarg.com/lunarg-signing-key-pub.asc \
              | sudo tee /etc/apt/keyrings/lunarg.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/lunarg.asc] https://packages.lunarg.com/vulkan jammy main" \
              | sudo tee /etc/apt/sources.list.d/lunarg-vulkan-jammy.list >/dev/null
          sudo apt-get update
          # x11 + wayland dev headers come transitively from libglfw3-dev
          # historically, but with glfw built from source via the shim
          # subproject we need to pull them explicitly. libwayland-bin
          # ships wayland-scanner, which the wayland-backend custom_targets
          # in dep/glfw/meson.build invoke at configure time.
          sudo apt-get install -y --no-install-recommends \
              build-essential ninja-build pkg-config python3-pip \
              shaderc libvulkan-dev libglfw3-dev \
              libraw-dev liblensfun-dev libsqlite3-dev libjpeg-dev \
              libtiff-dev libpng-dev libcurl4-openssl-dev \
              libdbus-1-dev \
              libxrandr-dev libxinerama-dev libxcursor-dev \
              libxi-dev libxext-dev libxkbcommon-dev \
              libwayland-dev libwayland-bin
          glslc --version
          # ubuntu-22.04's apt meson is 0.61; the project requires >=1.3.
          python3 -m pip install --upgrade 'meson>=1.3.0'

      - name: cache wrap downloads
        uses: actions/cache@v4
        with:
          path: |
            dep/packagecache
            dep/libpng-1.6.58
            dep/tiff-4.7.1
          key: meson-wraps-${{ runner.os }}-${{ hashFiles('dep/*.wrap') }}

      - name: configure
        run: meson setup build --buildtype=debug

      - name: test
        run: meson test -C build --print-errorlogs

  # Smoke-build Windows on every PR so regressions surface before a tag
  # push runs the full release-windows.yml. We only compile + link here;
  # the test suite is gated to Linux until the vendored dep tree settles
  # (cross-platform meson test is a follow-up under #442).
  build-windows:
    name: meson compile (windows-2022)
    runs-on: windows-2022
    # ilammy/msvc-dev-cmd resets VCPKG_ROOT to the VS-bundled vcpkg
    # (manifest-mode, rejects classic installs). Each subsequent step
    # re-pins VCPKG_ROOT in its own env block so the override sticks.
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install meson + ninja
        run: pip install --upgrade 'meson>=1.3.0' ninja

      - name: enter VS dev env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg\installed
            ${{ github.workspace }}\vcpkg\packages
          key: vcpkg-windows-x64-lensfun-v1

      - name: bootstrap vcpkg + install lensfun
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: .\packaging\windows\setup-deps.ps1 -VcpkgRoot $env:VCPKG_ROOT

      - name: meson setup
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          $pcPath = "$env:VCPKG_ROOT\installed\x64-windows\lib\pkgconfig"
          meson setup build --buildtype=debug --pkg-config-path "$pcPath"

      - name: meson compile
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: meson compile -C build
