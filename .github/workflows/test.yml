# Runs the meson test suite on every PR open/synchronize and every push
# to dev. Phase 2 of the test infrastructure rollout (umbrella #442).
#
# Branch protection on `dev` requiring this check is an operator step
# applied via GitHub Settings → Branches once this workflow has landed.

name: tests

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  test:
    name: meson test (ubuntu-22.04)
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install system dependencies
        run: |
          # ubuntu-22.04 has no glslc package; pull it from the LunarG
          # Vulkan SDK apt repo (shaderc ships /usr/bin/glslc). Mirrors
          # the install block in release-linux.yml.
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://packages.lunarg.com/lunarg-signing-key-pub.asc \
              | sudo tee /etc/apt/keyrings/lunarg.asc >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/lunarg.asc] https://packages.lunarg.com/vulkan jammy main" \
              | sudo tee /etc/apt/sources.list.d/lunarg-vulkan-jammy.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential ninja-build pkg-config python3-pip \
              shaderc libvulkan-dev libglfw3-dev \
              libraw-dev liblensfun-dev libsqlite3-dev libjpeg-dev \
              libtiff-dev libpng-dev libcurl4-openssl-dev
          glslc --version
          # ubuntu-22.04's apt meson is 0.61; the project requires >=1.3.
          python3 -m pip install --upgrade 'meson>=1.3.0'

      - name: cache wrap downloads
        uses: actions/cache@v4
        with:
          path: |
            dep/packagecache
            dep/cJSON
            dep/cimgui
            dep/lcms2
            dep/libpng-1.6.58
            dep/nativefiledialog-extended-1.3.0
            dep/tiff-4.7.1
            dep/tomlc99
          key: meson-wraps-${{ runner.os }}-${{ hashFiles('dep/*.wrap') }}

      - name: configure
        run: meson setup build --buildtype=debug

      - name: test
        run: meson test -C build --print-errorlogs
