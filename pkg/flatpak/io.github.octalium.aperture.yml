# Flatpak manifest for aperture.
#
# Builds against the freedesktop runtime (24.08 LTS) which provides
# the Vulkan loader, libpng, libtiff, and the common desktop stack.
# The one dep the runtime does NOT ship that we don't vendor —
# lensfun — is built as a module below. Everything else is vendored
# from the aperture tree: git submodules at dep/<name>/upstream/ for
# cimgui, lcms2, cJSON, nativefiledialog, tomlc99, glfw, libraw,
# libjpeg-turbo, vulkan-headers, and mbedtls; in-tree direct copies
# for blake3 and sqlite3 (no source entry needed for those).
#
# Bump runtime-version in lockstep with the freedesktop release we
# target. 24.08 is the current LTS as of 2026; 25.08 supersedes it
# on the next LTS cut.

app-id: io.github.octalium.aperture
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: aperture

finish-args:
  # graphics + window system
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # GPU access for Vulkan
  - --device=all
  # filesystem access for libraries and exports — host:ro is overly
  # broad; aperture writes only inside user-chosen library paths.
  # Flathub portal usage (file chooser via xdg-desktop-portal) covers
  # picking individual library roots without --filesystem=host.
  - --filesystem=host
  # native file dialogs go through xdg-desktop-portal
  - --talk-name=org.freedesktop.portal.FileChooser

modules:
  - name: lensfun
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTS=OFF
      - -DBUILD_LENSTOOL=OFF
      - -DBUILD_FOR_SSE=ON
      - -DBUILD_FOR_SSE2=ON
    sources:
      - type: archive
        url: https://github.com/lensfun/lensfun/archive/v0.3.4.tar.gz
        sha256: dafb39c08ef24a0e2abd00d05d7341b1bf1f0c38bfcd5a4c69cf5f0ecb6db112

  - name: aperture
    buildsystem: meson
    config-opts:
      - --buildtype=release
      # selects the Flatpak ap_updater backend (xdg-open appstream://
      # on "Update now"); see meson.options and src/update/updater.c
      - -Dap_dist=flatpak
    build-options:
      env:
        # pin AppStream release date to the tag's commit time at CI
        SOURCE_DATE_EPOCH: '0'
    sources:
      - type: git
        url: https://github.com/octalium/aperture.git
        # branch/tag/commit is rewritten by the release workflow before
        # flatpak-builder runs. Default keeps manual local builds usable
        # off main.
        branch: main

      # vendored submodule sources placed where each shim subproject's
      # meson.build expects them (dep/<name>/upstream/). The commit
      # for each is the SHA the .gitmodules / outer-tree gitlink pins;
      # bump in lockstep when the submodule pins change.

      - type: git
        url: https://github.com/cimgui/cimgui.git
        commit: 07fde25e7aff0b2b3eb536dd162d5ead162609d8
        dest: dep/cimgui/upstream

      - type: git
        url: https://github.com/ocornut/imgui.git
        commit: b61e56346a92cfcaf1f43a545ca37b0b32239654
        dest: dep/cimgui/upstream/imgui

      - type: git
        url: https://github.com/cktan/tomlc99.git
        commit: 29076dfd095bbbbd50a3c1b2760d29f4b83e74ac
        dest: dep/tomlc99/upstream

      - type: git
        url: https://github.com/mm2/Little-CMS.git
        tag: lcms2.19
        dest: dep/lcms2/upstream

      - type: git
        url: https://github.com/DaveGamble/cJSON.git
        tag: v1.7.19
        dest: dep/cJSON/upstream

      - type: git
        url: https://github.com/btzy/nativefiledialog-extended.git
        tag: v1.3.0
        dest: dep/nativefiledialog/upstream

      # mbedtls's own framework/ submodule is omitted — it ships
      # test scripts only; the library build does not reference it.
      - type: git
        url: https://github.com/Mbed-TLS/mbedtls.git
        tag: v3.6.4
        dest: dep/mbedtls/upstream

      - type: git
        url: https://github.com/KhronosGroup/Vulkan-Headers.git
        tag: vulkan-sdk-1.4.350.0
        dest: dep/vulkan-headers/upstream

      - type: git
        url: https://github.com/glfw/glfw.git
        tag: '3.4'
        dest: dep/glfw/upstream

      - type: git
        url: https://github.com/libjpeg-turbo/libjpeg-turbo.git
        tag: 3.1.4.1
        dest: dep/libjpeg-turbo/upstream

      - type: git
        url: https://github.com/LibRaw/LibRaw.git
        tag: 0.22.1
        dest: dep/libraw/upstream

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'
